name: Go CI
on:
  push:
    branches:
      - main
    paths:
      - go.mod
      - go/**
      - data/**
      - .github/workflows/go.yaml
      - codecov.yml
  pull_request:
    branches:
      - main
    paths:
      - go.mod
      - go/**
      - data/**
      - .github/workflows/go.yaml
      - codecov.yml
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  check-generated-files:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: '3.13'
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.26'
      - name: Generate merged data
        run: |
          mkdir -p _support
          python3 scripts/src/load/merge_data.py -o ./_support/merged_data.build.json
      - name: Regenerate Go sources
        run: |
          go generate ./go/...
      - name: Verify generated files are committed
        run: |
          git diff --exit-code -- go
          if [ -n "$(git status --short --untracked-files=all -- go)" ]; then
            git status --short --untracked-files=all -- go
            exit 1
          fi
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false  # we still want tests to run if vet fails, and we want all versions to run even if one fails
      matrix:
        go-version:
          - '1.25'
          - '1.26'
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: ${{ matrix.go-version }}
      - name: Run go vet
        run: |
          go vet ./go/...
      # we only want one of the tests jobs to generate coverage reports to avoid conflicts when uploading to codecov
      - name: Run tests with coverage
        if: matrix.go-version == '1.26'
        run: |
          go test -coverprofile=go/coverage.out ./go/...
      - name: Run tests
        if: matrix.go-version != '1.26'
        run: |
          go test -race ./go/...
      - name: Upload coverage to Codecov
        if: matrix.go-version == '1.26'
        uses: codecov/codecov-action@8cad3ba95e5920c42f44492e54bc9639cba47959  # v6.0.2
        with:
          files: go/coverage.out
          flags: go
          fail_ci_if_error: true
          disable_search: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - name: Setup Go
        uses: actions/setup-go@924ae3a1cded613372ab5595356fb5720e22ba16 # v6
        with:
          go-version: '1.25'
      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@82606bf257cbaff209d206a39f5134f0cfbfd2ee # v9.2.1
        with:
          version: v2.12.2
          args: ./go/...
