name: TypeScript CI
on:
  push:
    branches:
      - main
    paths:
      - typescript/**
      - .github/workflows/typescript.yaml
      - codecov.yml
  pull_request:
    branches:
      - main
    paths:
      - typescript/**
      - .github/workflows/typescript.yaml
      - codecov.yml
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set up node
        run: |
          cd typescript
          npm ci --prefer-offline -no-audit
      - name: Run the automated tests
        run: |
          cd typescript
          npm test
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5.5.4
        with:
          files: typescript/coverage/lcov.info
          flags: typescript
          fail_ci_if_error: false
      

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set up node
        run: |
          cd typescript
          npm ci --prefer-offline -no-audit
      - name: Run build
        run: |
          python3 scripts/src/load/merge_data.py -o ./typescript/resources/merged_data.json
          cd typescript
          npm run build
      - name: Link package
        run: |
          cd typescript
          npm link
      - name: Run smoke tests against linked package
        working-directory: typescript
        run: npm run test:smoke

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Set up node
        run: |
          cd typescript
          npm ci --prefer-offline -no-audit
      - name: Run linting
        run: |
          cd typescript
          npm run lint
