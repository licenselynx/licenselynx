name: TypeScript CI
on:
  push:
    branches:
      - main
    paths:
      - typescript/**
  pull_request:
    branches:
      - main
    paths:
      - typescript/**
jobs:
  tests:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set up node
        run: |
          cd typescript
          npm ci --prefer-offline -no-audit
      - name: Run the automated tests
        run: |
          cd typescript
          npm run test | grep "All files" | awk '{print $10}' > coverage.txt
      - name: Run coverage badge job
        run: |
          sudo apt-get install xq
          pip install anybadge
          cov_value=$(cat typescript/coverage.txt)
          cov_rounded=$(printf "%.1f\n" $(bc <<< "${cov_value}"))
          echo "Coverage found: ${cov_rounded}%"
          anybadge --label typescript:coverage --value ${cov_rounded} --suffix "%" --file website/badges/coverage-typescript.svg --overwrite
      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Update badge for typescript
      

  integration-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Set up node
        run: |
          cd typescript
          npm ci --prefer-offline -no-audit
      - name: Run build
        run: |
          python3 scripts/src/load/merge_data.py -o ./typescript/resources/merged_data.json
          cd typescript
          npm run build
      - name: Run integration test
        run: |
          cd typescript
          npm link
          npm ls --global @licenselynx/licenselynx
          mkdir -p ../../test-project && cd ../../test-project
          npm link @licenselynx/licenselynx

          # Test 1: Basic stable map lookup
          echo "import {map} from '@licenselynx/licenselynx'; map('0BSD').then(value => console.log(value.id));" > run.mjs
          result="$(npx ts-node run.mjs)"
          echo "Test 1 (stable map): $result"
          if [[ $result != "0BSD" ]]; then echo "FAIL: expected 0BSD"; exit 1; fi

          # Test 2: Risky map lookup with risky=true
          echo "import {map} from '@licenselynx/licenselynx'; map('LIbpng License v2', true).then(value => console.log(value.id));" > run.mjs
          result="$(npx ts-node run.mjs)"
          echo "Test 2 (risky=true): $result"
          if [[ $result != "libpng-2.0" ]]; then echo "FAIL: expected libpng-2.0"; exit 1; fi

          # Test 3: Risky entry must NOT resolve without risky flag
          echo "import {map} from '@licenselynx/licenselynx'; map('LIbpng License v2').then(value => console.log(value.id)).catch(e => console.log('NOT_FOUND'));" > run.mjs
          result="$(npx ts-node run.mjs)"
          echo "Test 3 (risky=false should reject): $result"
          if [[ $result != "NOT_FOUND" ]]; then echo "FAIL: expected NOT_FOUND"; exit 1; fi

          # Test 4: Organization map lookup
          echo "import {map} from '@licenselynx/licenselynx'; map('Siemens Inner Source License v1.5', false, 'siemens').then(value => console.log(value.id + '|' + value.src));" > run.mjs
          result="$(npx ts-node run.mjs)"
          echo "Test 4 (organization): $result"
          if [[ $result != "SISL-1.5|siemens" ]]; then echo "FAIL: expected SISL-1.5|siemens"; exit 1; fi

          # Test 5: Organization entry must NOT resolve without org parameter
          echo "import {map} from '@licenselynx/licenselynx'; map('Siemens Inner Source License v1.5').then(value => console.log(value.id)).catch(e => console.log('NOT_FOUND'));" > run.mjs
          result="$(npx ts-node run.mjs)"
          echo "Test 5 (org missing should reject): $result"
          if [[ $result != "NOT_FOUND" ]]; then echo "FAIL: expected NOT_FOUND"; exit 1; fi

          echo "All integration tests passed."

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Set up node
        run: |
          cd typescript
          npm ci --prefer-offline -no-audit
      - name: Run linting
        run: |
          cd typescript
          npm run lint
