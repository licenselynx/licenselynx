name: Java CI
on:
  push:
    branches:
      - main
    paths:
      - java/**
      - .github/workflows/java.yaml
      - codecov.yml
  pull_request:
    branches:
      - main
    paths:
      - java/**
      - .github/workflows/java.yaml
      - codecov.yml
  workflow_dispatch:
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 8
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run automated tests
        run: |
          mkdir _support
          python3 scripts/src/load/merge_data.py -o _support/merged_data.build.json
          ls -l _support || true
          cd java
          ./gradlew -Plicenselynx.datafile=../_support/merged_data.build.json ${GRADLE_ARGUMENTS} clean build jacocoTestReport publishAllPublicationsToStagingDeployRepository | tee job.log
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@57e3a136b779b570ffcdbf80b3bdc90e7fab3de2  # v6.0.0
        with:
          files: java/build/reports/jacoco/test/jacocoTestReport.xml
          flags: java
          fail_ci_if_error: true
          disable_search: true
          verbose: true
          token: ${{ secrets.CODECOV_TOKEN }}
