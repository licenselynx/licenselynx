name: Java CI
on:
  push:
    branches:
      - main
    paths:
      - java/**
  pull_request:
    branches:
      - main
    paths:
      - java/**
concurrency:
  group: ${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true
jobs:
  tests:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: 8
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v6
      - name: Run automated tests
        run: |
          mkdir _support
          python3 scripts/src/load/merge_data.py -o _support/merged_data.build.json
          ls -l _support || true
          cd java
          ./gradlew -Plicenselynx.datafile=../_support/merged_data.build.json ${GRADLE_ARGUMENTS} clean build publishAllPublicationsToLocalBuildDirRepository | tee job.log
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@75cd11691c0faa626561e295848008c8a7dddffe  # v5.5.4
        with:
          files: java/build/reports/jacoco/test/jacocoTestReport.xml
          flags: java
          fail_ci_if_error: false
