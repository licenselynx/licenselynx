site_name: LicenseLynx

theme:
  name: material
  palette:
    # Palette toggle for automatic mode
    - media: "(prefers-color-scheme)"
      toggle:
        icon: material/brightness-auto
        name: Switch to light mode

    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: light blue
      accent: deep orange
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode

    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: light blue
      accent: deep orange
      toggle:
        icon: material/brightness-4
        name: Switch to system preference
  logo: assets/LicenseLynx-favicon-no-bg.ico
  favicon: assets/LicenseLynx-favicon-no-bg.ico
  features:
    - navigation.footer

extra_css:
  - stylesheets/custom.css

nav:
  - Introduction: index.md
  - Installation: installation.md
  - Usage: usage.md
  - How LicenseLynx works: licenselynxworks.md
  - API Reference: api-reference.md
  - Data:
      - Data Quality: data-quality.md
      - Data Specification: data-specification.md
      - Matching Behavior: matching-behavior.md
      - Data Validation: data-validation.md
      - Risky Mappings: risky-mappings.md
  - FAQ: faq.md
  - Contributing:
      - Overview: contribution.md
      - Adding Mappings: contributing/adding-mappings.md
      - Organization Mappings: contributing/organization-mappings.md
      - New Language Library: contributing/new-language-library.md
      - Releases: contributing/releases.md

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/licenselynx/licenselynx

plugins:
  - search

copyright: >-
  Copyright &copy; 2025 Siemens AG
  <span class="footer-license">
    <a href="https://raw.githubusercontent.com/licenselynx/licenselynx/main/website/LICENSE" target="_blank" rel="license noopener" aria-label="Website license file">
      <img src="/assets/cc-mark.svg" alt="" aria-hidden="true" class="footer-license__icon">
      <span class="footer-license__text">CC BY 4.0</span>
    </a>
  </span>

markdown_extensions:
  - attr_list
  - md_in_html
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
